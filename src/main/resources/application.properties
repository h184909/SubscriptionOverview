spring.application.name=subscriptionapp

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/subscriptionoverview?currentSchema=subscription_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:subscription_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.properties.hibernate.default_schema=${SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA:subscription_app}

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

server.error.include-message=always

yapily.app-id=${YAPILY_APP_ID:}
yapily.secret=${YAPILY_SECRET:}
yapily.base-url=${YAPILY_BASE_URL:https://api.yapily.com}
yapily.callback-url=${YAPILY_CALLBACK_URL:http://localhost:8080/openbanking/callback}
yapily.environment=${YAPILY_ENV:sandbox}

lunchflow.base-url=https://www.lunchflow.app/api/platform/v1
lunchflow.oauth-url=https://www.lunchflow.app/api/platform
lunchflow.authorize-url=https://www.lunchflow.app/api/platform/oauth/authorize
lunchflow.redirect-uri=https://subscriptionoverview.com/lunchflow/callback
lunchflow.client-id=${LUNCHFLOW_CLIENT_ID}
lunchflow.client-secret=${LUNCHFLOW_CLIENT_SECRET}

spring.jpa.open-in-view=false

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=0

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.jpa.hibernate.ddl-auto=update
