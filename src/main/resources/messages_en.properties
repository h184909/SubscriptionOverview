support.title=Support
support.header=How can we help?
support.lead=Find answers to common questions or contact us if something does not work as expected.
support.emailButton=Email support
support.back=Back to the front page
support.faqTitle=Frequently asked questions
support.faq.csv.q=Which CSV files are supported?
support.faq.csv.a=The importer supports the standard format and several Norwegian bank variants. It automatically tries to recognise separators, date columns, descriptions and amounts.
support.faq.bank.q=Why can I not connect my bank?
support.faq.bank.a=Bank availability depends on the current Open Banking provider and active consent. CSV import remains available when a bank connection is unavailable.
support.faq.suggestion.q=Why is a transaction not shown as a subscription?
support.faq.suggestion.a=A recurring pattern normally needs several similar payments. You can still add the subscription manually from the subscriptions page.
support.faq.delete.q=How do I delete my data?
support.faq.delete.a=Open Profile to disconnect a bank, remove subscriptions or permanently delete your account and related data.

privacy.title=Privacy
privacy.header=Privacy information
privacy.updated=Last updated: July 2026.
privacy.collect.title=Information we process
privacy.collect.text=The service processes account information you provide, imported transaction data, subscriptions you accept or add, and settings needed to operate your account.
privacy.use.title=How the information is used
privacy.use.text=Information is used to detect recurring payments, calculate subscription insights, provide account functionality and improve reliability.
privacy.bank.title=Bank connections
privacy.bank.text=A bank connection is used only to retrieve data covered by the consent you grant through the Open Banking provider. Disconnecting the bank removes the stored connection, while previously imported data may remain until you delete it.
privacy.delete.title=Deletion and control
privacy.delete.text=You can manage subscriptions and bank access from your profile. You can also permanently delete your account and related application data.
privacy.contact.title=Contact
privacy.contact.text=Questions about privacy can be sent to support@subscriptionoverview.com.

terms.title=Terms
terms.header=Terms of use
terms.updated=Last updated: July 2026.
terms.service.title=The service
terms.service.text=SubscriptionOverview provides tools for organising subscription information and analysing recurring payments. It is not a bank, financial adviser or payment provider.
terms.account.title=Your account
terms.account.text=You are responsible for keeping your login information secure and for ensuring that information you upload is lawful and belongs to you.
terms.accuracy.title=Suggestions and estimates
terms.accuracy.text=Detected subscriptions, forecasts and insights are estimates based on available data. You should verify important amounts, payment dates and cancellation details yourself.
terms.availability.title=Availability
terms.availability.text=Features may change, be unavailable or depend on third-party services such as email, exchange-rate data and Open Banking providers.
terms.contact.title=Contact
terms.contact.text=Questions about these terms can be sent to support@subscriptionoverview.com.

