spring.application.name=subscriptionapp

spring.datasource.url=jdbc:postgresql://ider-database.westeurope.cloudapp.azure.com:5433/h184909
spring.datasource.username=h184909
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=subscription_app

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

server.error.include-message=always

yapily.app-id=${YAPILY_APP_ID}
yapily.secret=${YAPILY_SECRET}
yapily.base-url=https://api.yapily.com

yapily.callback-url=${YAPILY_CALLBACK_URL:http://localhost:8080/openbanking/callback}
yapily.environment=${YAPILY_ENV:sandbox}

# 1) Viktig: Ikke hold EntityManager/connection gjennom view rendering
spring.jpa.open-in-view=false

# 2) Hikari - mer robust under import
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# 3) Leak detector: (for dev kan du sette h°yere eller midlertidig slň av)
# Hvis denne er lav (f.eks 2000ms) fňr du ofte falske alarmer ved tunge inserts.
spring.datasource.hikari.leak-detection-threshold=0

# 4) Hibernate batch (hjelper performance)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

