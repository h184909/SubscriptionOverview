support.back=Tilbake til forsiden
support.faqTitle=Ofte stilte spørsmål
support.faq.csv.q=Hvilke CSV-filer støttes?
support.faq.csv.a=Importen støtter standardformatet og flere norske bankvarianter. Den forsøker automatisk å gjenkjenne skilletegn, datokolonner, beskrivelser og beløp.
support.faq.bank.q=Hvorfor kan jeg ikke koble til banken?
support.faq.bank.a=Tilgjengelige banker avhenger av gjeldende Open Banking-leverandør og aktivt samtykke. CSV-import kan fortsatt brukes når banktilkoblingen ikke er tilgjengelig.
support.faq.suggestion.q=Hvorfor vises ikke en transaksjon som et abonnement?
support.faq.suggestion.a=Et fast mønster trenger vanligvis flere lignende betalinger. Du kan fortsatt legge inn abonnementet manuelt fra abonnementssiden.
support.faq.delete.q=Hvordan sletter jeg dataene mine?
support.faq.delete.a=Åpne Profil for å koble fra banken, fjerne abonnement eller slette kontoen og tilhørende data permanent.

privacy.title=Personvern
privacy.header=Informasjon om personvern
privacy.updated=Sist oppdatert: juli 2026.
privacy.collect.title=Informasjon vi behandler
privacy.collect.text=Tjenesten behandler kontoinformasjon du oppgir, importerte transaksjoner, abonnement du godtar eller legger inn, og innstillinger som er nødvendige for kontoen.
privacy.use.title=Hvordan informasjonen brukes
privacy.use.text=Informasjonen brukes til å oppdage faste trekk, beregne abonnementsinnsikt, levere kontofunksjoner og forbedre stabiliteten.
privacy.bank.title=Banktilkoblinger
privacy.bank.text=En banktilkobling brukes bare til å hente data som omfattes av samtykket du gir gjennom Open Banking-leverandøren. Når banken kobles fra, fjernes den lagrede tilkoblingen, mens tidligere importerte data kan beholdes til du sletter dem.
privacy.delete.title=Sletting og kontroll
privacy.delete.text=Du kan administrere abonnement og banktilgang fra profilen. Du kan også slette kontoen og tilhørende applikasjonsdata permanent.
privacy.contact.title=Kontakt
privacy.contact.text=Spørsmål om personvern kan sendes til support@subscriptionoverview.com.

terms.title=Vilkår
terms.header=Vilkår for bruk
terms.updated=Sist oppdatert: juli 2026.
terms.service.title=Tjenesten
terms.service.text=SubscriptionOverview tilbyr verktøy for å organisere abonnementsinformasjon og analysere faste trekk. Tjenesten er ikke en bank, finansiell rådgiver eller betalingsleverandør.
terms.account.title=Kontoen din
terms.account.text=Du er ansvarlig for å holde innloggingsinformasjonen sikker og for at informasjonen du laster opp er lovlig og tilhører deg.
terms.accuracy.title=Forslag og estimater
terms.accuracy.text=Oppdagede abonnement, prognoser og innsikter er estimater basert på tilgjengelige data. Du bør selv kontrollere viktige beløp, betalingsdatoer og informasjon om oppsigelse.
terms.availability.title=Tilgjengelighet
terms.availability.text=Funksjoner kan endres, være utilgjengelige eller avhenge av tredjepartstjenester som e-post, valutakurser og Open Banking-leverandører.
terms.contact.title=Kontakt
terms.contact.text=Spørsmål om vilkårene kan sendes til support@subscriptionoverview.com.


